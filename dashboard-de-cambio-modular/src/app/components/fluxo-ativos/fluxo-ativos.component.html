<div class="card-fluxo">
  <div class="header">
    <h3>Fluxo de Capital (Ativos)</h3>
    <span class="sub">Volume em Bilhões (USD)</span>
  </div>
  
  <div class="chart-container">
    <!-- Só renderiza o echarts se estiver no navegador -->
    @if (isBrowser() && chartOptions()) {
      <div echarts [options]="chartOptions()!" class="chart"></div>
    } @else {
      <div class="loading">Carregando dados de ativos...</div>
    }
  </div>
</div>
