<div class="card-mapa">
    <div class="header-mapa">
        <h3>Fluxo de Capital Global</h3>
    </div>

    <div class="mapa-container">
        <!-- O @if garante que o ECharts só apareça quando o navegador estiver pronto -->
        @if (isBrowser()) {
          <div echarts [options]="chartOptions" style="width: 100%; height: 320px;"></div>
        } @else {
          <div class="loading-mapa">Carregando mapa...</div>
        }
    </div>
<div echarts 
     [options]="chartOptions" 
     (chartInit)="onChartInit($event)" 
     class="mapa-container">
</div>
</div>
