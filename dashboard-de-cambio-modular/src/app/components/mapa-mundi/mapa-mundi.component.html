<div class="card-mapa">
  <div class="header-mapa">
    <!-- NOVO ÍCONE DE INFO PREMIUM -->
    <div class="info-container-top" 
         (mouseenter)="exibirExplicacao.set(true)" 
         (mouseleave)="exibirExplicacao.set(false)"
         (click)="toggleExplicacao()">
      
      <span class="info-icon">i</span>
      
      @if (exibirExplicacao()) {
        <div class="info-tooltip">
          Países em destaque refletem moedas com maior volatilidade ou zonas de conflito geopolítico de alto impacto para a economia global.
        </div>
      }
    </div>

    <h3>Fluxo de Capital Global</h3>
  </div>

  <div class="mapa-relative-container">
    <div class="zoom-controls">
      <button (click)="ajustarZoom(1.2)">+</button>
      <button (click)="ajustarZoom(0.8)">-</button>
      <button (click)="resetarMapa()">⟲</button>
    </div>

    <div class="mapa-container">
      @if (isBrowser()) {
        <div echarts 
             [options]="chartOptions" 
             [autoResize]="true"
             (chartInit)="onChartInit($event)">
        </div>
      }
    </div>
  </div>
</div>
