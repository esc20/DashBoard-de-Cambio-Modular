<header>
  <!-- CAMADA 1: BACKGROUND -->
  <div class="image-container" [style.backgroundImage]="'url(' + imagemAtual() + ')'">
    <div class="overlay-gradient"></div>
    <div class="scanline-effect"></div>
  </div>

  <!-- CAMADA 2: CONTEÚDO -->
  <div class="logo">
    <div class="logo-icon">
      <div class="bar bar-1"></div>
      <div class="bar bar-2"></div>
      <div class="bar bar-3"></div>
    </div>
    <div class="logo-text">
      <span class="brand-name">GLOBAL FLOW</span>
      <span class="brand-sub">TERMINAL</span>
    </div>
  </div>

  <div class="search-container" [class.aberto]="exibirBusca()">
    <div class="search-bar">
      <!-- O input agora dispara a busca ao apertar ENTER -->
      <input type="text" 
             placeholder="BUSCAR PAÍS..." 
             (keyup.enter)="dispararBusca($event)">
    </div>
    <i class="fa-solid fa-magnifying-glass" (click)="alternarBusca()"></i>
  </div>
</header>
