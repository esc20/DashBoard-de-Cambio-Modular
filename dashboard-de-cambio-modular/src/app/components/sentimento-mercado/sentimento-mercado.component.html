<div class="card-sentimento">
  <!-- ÍCONE DE INFO PREMIUM -->
  <div class="info-container-top" 
       (mouseenter)="exibirExplicacao.set(true)" 
       (mouseleave)="exibirExplicacao.set(false)"
       (click)="toggleExplicacao()">
    
    <span class="info-icon">i</span>
    
    @if (exibirExplicacao()) {
      <div class="info-tooltip">
        Índice Fear & Greed: Analisa a emoção dominante do mercado através de volatilidade, volume e redes sociais. 0 é Medo Extremo e 100 é Ganância Extrema.
      </div>
    }
  </div>

  <h3 class="titulo-mini">Sentimento do Mercado</h3>
  
  <div class="gauge-svg-container">
    <svg viewBox="0 0 100 100" class="gauge-svg">
      <circle class="gauge-base" cx="50" cy="50" r="45"></circle>
      <circle class="gauge-progress" cx="50" cy="50" r="45"
              [style.stroke-dashoffset]="calcularOffset()" 
              [style.stroke]="obterCorStatus()">
      </circle>
    </svg>

    <div class="centro-texto">
      <span class="numero" [style.opacity]="valorSentimento() === 0 ? 0.3 : 1">
        {{ valorSentimento() || '--' }}
      </span> 
      <span class="status" [style.color]="obterCorStatus()">{{ obterStatusTexto() }}</span>
    </div>
  </div>

  <div class="legendas">
    <span>Medo</span>
    <span>Neutro</span>
    <span>Ganância</span>
  </div>
</div>
