<div class="card-financeiro">
  <h3>Taxas de Câmbio</h3>
  
  <div class="lista-moedas">
    <!-- Usamos o Signal moedas() -->
    <div class="linha-moeda" *ngFor="let moeda of moedas()">
      <div class="flag-container">
        <!-- Caminho da bandeira vindo do objeto -->
        <img [src]="'assets/bandeiras/' + moeda.bandeira" [alt]="moeda.nome" 
             onerror="this.src='https://via.placeholder.com/35'">
      </div>
      
      <div class="info-pais">
        <span class="nome">{{ moeda.nome }}</span>
        <span class="valor">
          {{ moeda.sigla }}: {{ moeda.valor | number:'1.2-2' }}
        </span>
      </div>
      
      <!-- Exemplo de tendência (opcional no seu SCSS) -->
      <span class="status" [ngClass]="moeda.tendencia">
        {{ moeda.tendencia === 'subindo' ? '↑' : '↓' }}
      </span>
    </div>
  </div>
</div>

<!-- Outros elementos do seu Dashboard conforme o SCSS fornecido -->
<div class="card-tendencia-mundial">Tendência Mundial</div>
<div class="ciclo-de-juros">Ciclo de Juros</div>
<div class="sentimento-do-mercado">Sentimento do Mercado</div>
<div class="mapa-mundi">Mapa Mundi</div>
