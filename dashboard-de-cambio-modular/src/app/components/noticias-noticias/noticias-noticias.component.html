<div class="card-noticias">
    <!-- ÍCONE DE INFORMAÇÃO PREMIUM -->
    <div class="info-container-top" 
         (mouseenter)="exibirExplicacao.set(true)" 
         (mouseleave)="exibirExplicacao.set(false)"
         (click)="toggleExplicacao()">
        
        <span class="info-icon">i</span>
        
        @if (exibirExplicacao()) {
          <div class="info-tooltip">
            Feed de notícias em tempo real focado em impacto econômico e movimentação de grandes ativos globais.
          </div>
        }
    </div>

    <div class="header">
        <div class="live-indicator">
            <span class="ponto"></span>
            <h3>NOTÍCIAS DO MERCADO</h3>
        </div>
    </div>

    <div class="feed-container">
        @for (item of noticias(); track item.title) {
            <div class="noticia-card">
                <div class="thumb-container">
                    <img [src]="item.urlToImage" 
                         alt="Capa" 
                         referrerpolicy="no-referrer"
                         (error)="substituirImagemErro($event)">
                    <span class="fonte-tag">{{ item.source.name || 'Global' }}</span>
                </div>

                <div class="info">
                    <h4 class="manchete">{{ item.title }}</h4>
                    <div class="footer-noticia">
                        <span class="tempo">Live Feed</span>
                        <span class="leia-mais">Ler manchete completa →</span>
                    </div>
                </div>
            </div>
        }
    </div>
</div>
